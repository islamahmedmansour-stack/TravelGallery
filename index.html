    <h1>travel gallery</h1>
    <section class="container mx-auto" id="main">
        <div class="row gx-2 gy-4 ">
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/01.jpg" alt="Alpine Majesty">
                    <h3 class="rounded-3">Alpine Majesty</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/02.jpg" alt="Urban Dreams">
                    <h3 class="rounded-3">Urban Dreams</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/03.avif" alt="Culinary Journey">
                    <h3 class="rounded-3">Culinary Journey</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/04.jpg" alt="Modern Marvels">
                    <h3 class="rounded-3">Modern Marvels</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/05.jpeg" alt="Wanderlust">
                    <h3 class="rounded-3">Wanderlust</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/06.avif" alt="Safari Stories">
                    <h3 class="rounded-3">Safari Stories</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/07.webp" alt="Ancient Wonders">
                    <h3 class="rounded-3">Ancient Wonders</h3>
                </div>
            </div>
            <!-- ----------- -->
            <div class="col-lg-3 col-md-6 item">
                <div class="place">
                    <img class="placeImage w-100 h-100 rounded-3" src="images/08.webp" alt="Paradise Found">
                    <h3 class="rounded-3">Paradise Found</h3>
                </div>
            </div>
            <!-- ----------- -->
        </div>
    </section>
    <!-- ===============================(display full screen)=================  -->
    <section class="fullScreenDisplay" id="fullScreen">
        <div class="d-flex justify-content-between align-items-center">
            <div id="leftIcon" class="icon_div"><i class="fa-solid fa-angle-left fa-2x"></i></div>
            <div>
                <img id="showImage" src="images/01.jpg" class="fullImage" alt="showimage">
            </div>
            <div id="rightIcon" class="icon_div"><i class="fa-solid fa-angle-right fa-2x"></i></div>
        </div>
        <h3 id="fullTitle" class="mx-auto">Alpine Majesty</h3>
        <p id="description" class="mx-auto">Snow-capped peaks pierce the clouds in the Swiss Alps, creating a breathtaking vista that
            captures nature's grandeur.
        </p>
        <div id="closeIcon" class="icon_div"><i class="fa-solid fa-xmark"></i></div>
    </section>
